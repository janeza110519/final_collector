<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoWise Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <img src="https://via.placeholder.com/44x44/006d6d/ffffff?text=Eco" alt="Logo">
        <h1>EcoWise Dashboard</h1>
        <div class="user-info">
            <span id="welcomeUser">Welcome, Guest</span>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📍 Location</h2>
        <select id="locationSelect">
            <option>Sankanan</option>
            <option>Tankulan</option>
            <option>Damilag</option>
            <option>Dalirig</option>
            <option>San Miguel</option>
            <option>Lingion</option>
            <option>Maluko</option>
            <option>Lindaban</option>
            <option>Alae</option>
        </select>

        <h2>📅 Schedule</h2>
        <select id="daySelect">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
            <option>Sunday</option>
        </select>

        <h2>🎯 Target Waste</h2>
        <select id="targetSelect">
            <option>♻ Recyclable Waste</option>
            <option>🌱 Biodegradable</option>
            <option>🚮 Non-Biodegradable</option>
        </select>

        <h2>⚡ Importance</h2>
        <select id="importanceSelect">
            <option>Priority</option>
            <option>Non-Priority</option>
        </select>

        <h2>📊 Status</h2>
        <select id="statusSelect">
            <option>Pending</option>
            <option>Accomplished</option>
        </select>

        <button id="setBtn">✅ Set Task</button>
        <button id="clearFiltersBtn">🗑️ Clear All</button>
        <button id="logoutBtn" class="logout">🚪 Logout</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Charts Section -->
        <div class="charts-section">
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="wasteTypeChart"></canvas>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="search-filter">
            <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Accomplished">Accomplished</option>
            </select>
            <button id="addTaskBtn">➕ Add New Task</button>
        </div>

        <!-- Tasks Table -->
        <div class="table-container">
            <h2>List of Tasks <span id="taskCount">(0)</span></h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>📍 Location</th>
                        <th>📅 Day</th>
                        <th>🎯 Target</th>
                        <th>⚡ Importance</th>
                        <th>📊 Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="taskTable">
                </tbody>
            </table>
        </div>

        <!-- CRUD Modal -->
        <div id="crudModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">Add Task</h2>
                <form id="crudForm">
                    <input type="hidden" id="taskId">
                    <label>Location</label>
                    <input type="text" id="editLocation" required>
                    
                    <label>Day</label>
                    <select id="editDay" required>
                        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                        <option>Thursday</option><option>Friday</option><option>Saturday</option>
                        <option>Sunday</option>
                    </select>
                    
                    <label>Target</label>
                    <select id="editTarget" required>
                        <option>♻ Recyclable Waste</option>
                        <option>🌱 Biodegradable</option>
                        <option>🚮 Non-Biodegradable</option>
                    </select>
                    
                    <label>Importance</label>
                    <select id="editImportance" required>
                        <option>Priority</option>
                        <option>Non-Priority</option>
                    </select>
                    
                    <label>Status</label>
                    <select id="editStatus" required>
                        <option>Pending</option>
                        <option>Accomplished</option>
                    </select>
                    
                    <div class="modal-buttons">
                        <button type="submit">Save</button>
                        <button type="button" id="cancelBtn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
</div>

<script src="script.js"></script>
</body>
</html>
